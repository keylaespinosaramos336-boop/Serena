<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Psicólogo - Serena</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f7f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* MARCO TELEFONO */
        .phone-frame {
            width: 380px;
            height: 760px;
            background: #1a1a1a;
            border-radius: 50px;
            padding: 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* PANTALLA */
        .phone {
            width: 340px;
            height: 680px;
            background: white;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* NOTCH */
        .notch {
            width: 120px;
            height: 25px;
            background: #1a1a1a;
            border-radius: 0 0 20px 20px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* CONTENIDO */
        .logo {
            display: flex;
            justify-content: center;
            margin-top: 35px;
            margin-bottom: 10px;
        }

        .logo img {
            width: 85px;
            filter: drop-shadow(0 8px 12px rgba(45, 78, 131, 0.1));
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: #2d4e83; /* Azul fuerte de Serena */
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }

        /* INPUTS ESTILO SERENA */
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 15px;
            border: 1px solid #e0e6ed;
            background: #f9fbff;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4a7ab5;
            background: white;
            box-shadow: 0 0 0 4px rgba(74, 122, 181, 0.1);
        }

        /* BOTÓN PRINCIPAL */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 15px;
            background: #2d4e83;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            margin-top: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(45, 78, 131, 0.2);
        }

        button:hover {
            background: #1e3a63;
            transform: translateY(-2px);
        }

        /* BOTÓN VOLVER */
        .back {
            margin-top: auto;
            margin-bottom: 10px;
            text-align: center;
            font-size: 13px;
            color: #888;
            cursor: pointer;
        }

        .back span {
            color: #2d4e83;
            font-weight: 800;
            text-decoration: underline;
        }

        /* DECORACIÓN DE FONDO */
        .circle {
            position: absolute;
            background: linear-gradient(135deg, rgba(74, 122, 181, 0.05), rgba(45, 78, 131, 0.03));
            border-radius: 50%;
            z-index: 1;
        }
        .c1 { width: 220px; height: 220px; top: -60px; right: -70px; }
        .c2 { width: 160px; height: 160px; bottom: -40px; left: -40px; }

    </style>
</head>
<body>

<div class="phone-frame">
    <div class="phone">
        <div class="notch"></div>
        
        <div class="circle c1"></div>
        <div class="circle c2"></div>

        <div class="logo">
            <img src="imagenes/logo3.png" alt="Logo Serena">
        </div>

        <div class="title">Psicólogo</div>
        <p class="subtitle">Únete a nuestra red de especialistas</p>

        <form action="../registroPsicologoServlet" method="POST" style="position: relative; z-index: 5;">
            <input type="text" name="nombre" placeholder="Nombre completo" required
                   oninvalid="this.setCustomValidity('Por favor, ingresa tu nombre')" oninput="this.setCustomValidity('')">
            
            <input type="email" name="correo" placeholder="Correo electrónico" required
                   oninvalid="this.setCustomValidity('Necesitamos un correo válido')" oninput="this.setCustomValidity('')">
            
            <input type="password" name="password" placeholder="Contraseña" required
                   oninvalid="this.setCustomValidity('Crea una contraseña')" oninput="this.setCustomValidity('')">
            
            <input type="password" name="confirm_password" placeholder="Confirmar contraseña" required
                   oninvalid="this.setCustomValidity('Confirma tu contraseña')" oninput="this.setCustomValidity('')">
            
            <input type="text" name="cedula" placeholder="Cédula o Licencia Profesional" required
                   oninvalid="this.setCustomValidity('La cédula profesional es obligatoria')" oninput="this.setCustomValidity('')">
            
            <input type="text" name="especialidad" placeholder="Especialidad (ej. Clínica, Cognitiva)" required
                   oninvalid="this.setCustomValidity('Indica tu especialidad')" oninput="this.setCustomValidity('')">

            <button type="submit">Crear cuenta</button>
        </form>

        <div class="back" onclick="window.location.href='login.html'">
            ¿Ya tienes cuenta? <span>Inicia sesión</span>
        </div>
    </div>
</div>

</body>
</html>
