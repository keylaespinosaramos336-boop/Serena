<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Serena</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* ══════════════════════════════
           ESCRITORIO: fondo gris + marco
           ══════════════════════════════ */
        @media (min-width: 768px) {
            body {
                background: #f4f7f9;
            }
            .phone-frame {
                position: relative;
                background: #1a1a1a;
                box-shadow: 0 30px 60px rgba(0,0,0,0.3);
                width: 380px;
                height: 760px;
                border-radius: 50px;
                padding: 15px;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-shrink: 0;
            }
            .phone {
                width: 340px;
                height: 680px;
                border-radius: 40px;
                overflow: hidden;
            }
            .notch {
                display: block;
                width: 120px;
                height: 25px;
                background: #1a1a1a;
                border-radius: 0 0 20px 20px;
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10;
            }
        }

        /* ══════════════════════════════
           MOVIL: pantalla completa, sin marco
           ══════════════════════════════ */
        @media (max-width: 767px) {
            body {
                background: linear-gradient(180deg, #4a7ab5 0%, #2d4e83 100%);
                align-items: stretch;
                min-height: 100dvh;
            }
            .phone-frame {
                width: 100%;
                flex: 1;
                display: flex;
            }
            .phone {
                width: 100%;
                min-height: 100dvh;
                border-radius: 0;
            }
            .notch { display: none; }
            .screen {
                padding: 60px 30px 40px !important;
                margin-top: 0 !important;
            }
        }

        /* ══════════════════════════════
           PANTALLA INTERNA
           ══════════════════════════════ */
        .phone {
            background: linear-gradient(180deg, #4a7ab5 0%, #2d4e83 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .screen {
            flex: 1;
            padding: 40px 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            text-align: center;
            margin-top: 20px;
        }

        .welcome-text span {
            display: block;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 10px;
            font-weight: 400;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .title {
            font-size: 42px;
            font-weight: 800;
            margin: 0;
        }

        .logo-container {
            flex: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
        }

        .login-box {
            width: 100%;
            margin-top: auto;
        }

        input {
            width: 85%;
            margin: 0 auto 15px auto;
            display: block;
            text-align: center;
            padding: 12px;
            background: transparent !important;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 16px;
            color: white !important;
            outline: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        input::placeholder { color: rgba(255,255,255,0.6); }

        .login-btn {
            width: 90%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            background: white;
            color: #2d4e83;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .register-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            opacity: 0.8;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: block;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 10px;
        }
        .register-btn span {
            text-decoration: underline;
            font-weight: 700;
        }

        .circle {
            position: absolute;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }
        .c1 { width: 250px; height: 250px; top: -50px; right: -80px; }
        .c2 { width: 180px; height: 180px; bottom: 150px; left: -50px; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="phone">
        <div class="notch"></div>
        <div class="circle c1"></div>
        <div class="circle c2"></div>

        <div class="screen">
            <div class="welcome-text">
                <span>Bienvenido a</span>
                <h1 class="title">Serena</h1>
            </div>

            <div class="logo-container">
                <img src="imagenes/logo2.png" alt="Logo Serena">
            </div>

            <div class="login-box">
                <form action="../loginServlet" method="post">
                    <input type="email" name="correo" placeholder="correo@ejemplo.com" required autocomplete="off">
                    <input type="password" name="password" placeholder="contrasena" required autocomplete="off">
                    <button type="submit" class="login-btn">Ingresar</button>
                </form>

                <button class="register-btn" onclick="location.href='tipoCuenta.html'">
                    No tienes cuenta? <span>Registrate</span>
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
