<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Serena</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* BASE: Limpiamos todo */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(180deg, #4a7ab5 0%, #2d4e83 100%);
        }

        /* Contenedor que siempre se verá */
        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- ESTILO PARA ESCRITORIO (FRAME DE TELÉFONO) --- */
        @media (min-width: 768px) {
            body { background: #f4f7f9; }
            .phone-frame {
                width: 380px;
                height: 760px;
                background: #1a1a1a;
                border-radius: 50px;
                padding: 15px;
                box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            }
            .phone {
                width: 100%;
                height: 100%;
                border-radius: 40px;
                background: linear-gradient(180deg, #4a7ab5 0%, #2d4e83 100%);
                position: relative;
                overflow: hidden;
            }
        }

        /* --- ESTILO PARA MÓVIL --- */
        @media (max-width: 767px) {
            .phone-frame { width: 100%; height: 100%; }
            .phone { width: 100%; height: 100%; }
            .notch { display: none; }
        }

        /* Estilos de elementos */
        .screen { width: 100%; display: flex; flex-direction: column; align-items: center; color: white; }
        .logo-container img { width: 180px; margin: 20px 0; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; color: white; text-align: center; }
        .login-btn { width: 92%; padding: 15px; background: white; color: #2d4e83; border-radius: 20px; border: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="phone">
        <div class="notch"></div>
        <div class="screen">
            <div class="welcome-text" style="margin-top: 60px;">
                <span>Bienvenido a</span>
                <h1 class="title" style="margin:0;">Serena</h1>
            </div>

            <div class="logo-container">
                <img src="imagenes/logo2.png" alt="Logo Serena">
            </div>

            <div class="login-box" style="width: 100%; text-align: center;">
                <form action="../loginServlet" method="post">
                    <input type="email" name="correo" placeholder="correo@ejemplo.com" required>
                    <input type="password" name="password" placeholder="contraseña" required>
                    <button type="submit" class="login-btn">Ingresar</button>
                </form>
                
                <button class="register-btn" style="margin-top:20px; cursor:pointer;" onclick="location.href='tipoCuenta.html'">
                    ¿No tienes cuenta? <span>Regístrate</span>
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
